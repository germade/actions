name: Install Missing Commands
description: Install missing Linux commands required by the workflow

inputs:
  checkout:
    description: Whether to perform a git checkout before checking commands (false, true, v4, v5, or v6)
    required: false
    default: false
  setup-node:
    description: Whether to setup Node.js using actions/setup-node before checking commands (false, true, v4, v5, or v6)
    required: false
    default: false
  node-version:
    description: Node.js version to setup if setup-node is enabled (can be a version string or path to .nvmrc)
    required: false
    type: string
    default: ""
  node-version-file:
    description: Path to file containing Node.js version (e.g. .nvmrc) to setup if setup-node is enabled
    required: false
    type: string
    default: ""
  install-node-dependencies:
    description: Whether to run 'npm install' after setting up Node.js
    required: false
    type: boolean
    default: false
  use-node-cache:
    description: Whether to use actions/cache for caching node_modules based on package-lock.json
    required: false
    default: true
  install-node-dependencies-no-save:
    description: Whether to run 'npm install --no-save' instead of 'npm install'
    required: false
    type: boolean
    default: false
  install-linux-commands:
    description: Commands to check and install
    required: false
    type: string
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout code (optional)
      if: ${{ inputs.checkout == 'v4' }}
      uses: actions/checkout@v4

    - name: Checkout code (optional)
      if: ${{ inputs.checkout == 'v5' }}
      uses: actions/checkout@v5
    
    - name: Checkout code (optional)
      if: ${{ inputs.checkout == 'true' || inputs.checkout == true || inputs.checkout == 'v6' }}
      uses: actions/checkout@v6

    - name: Setup Node (optional)
      if: ${{ inputs.setup-node == 'v4' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}

    - name: Setup Node (optional)
      if: ${{ inputs.setup-node == 'v5' }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}
    
    - name: Setup Node (optional)
      if: ${{ inputs.setup-node == 'true' || inputs.setup-node == true || inputs.setup-node == 'v6' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}

    - name: Use Node cache (optional)
      if: ${{ inputs.install-node-dependencies != 'false' && inputs.install-node-dependencies != false && inputs.use-node-cache != 'false' && inputs.use-node-cache != false }}
      uses: actions/cache@v5
      with:
        path: '**/node_modules'
        key: ${{ runner.os }}-${{ inputs.node-version || 'default' }}-${{ inputs.use-node-cache || format('node-deps-{0}', hashFiles('**/package.json')) }}

    - name: Install Node.js dependencies (optional)
      shell: bash
      if: ${{ inputs.install-node-dependencies == 'true' || inputs.install-node-dependencies == true }}
      run: rm -f package-lock.json && npm install
    
    - name: Install Node.js dependencies (optional, no-save)
      shell: bash
      if: ${{ inputs.install-node-dependencies-no-save == 'true' || inputs.install-node-dependencies-no-save == true }}
      run: npm install --no-save
    
    - name: Check and install missing commands
      if: ${{ inputs.install-linux-commands != '' }}
      shell: bash
      run: |
        CHECK_COMMANDS=(${{ inputs.install-linux-commands }})

        MISSING_COMMANDS=()

        for cmd in "${CHECK_COMMANDS[@]}"; do
          if ! command -v "$cmd" &> /dev/null; then
            echo "$cmd could not be found, marking for installation..."
            MISSING_COMMANDS+=("$cmd")
          else
            echo "$cmd is already installed"
          fi
        done

        if [ ${#MISSING_COMMANDS[@]} -gt 0 ]; then
          echo "Installing missing packages: ${MISSING_COMMANDS[*]}"
          sudo apt-get update
          sudo apt-get install -y "${MISSING_COMMANDS[@]}"
        else
          echo "All required commands are available"
        fi
