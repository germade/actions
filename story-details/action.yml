
name: Export Story details
description: Exports story details like ID, PR num and branch name based on branch and PR info, if available.

outputs:
  story-id:
    description: The extracted story ID
    value: ${{ steps.export-id.outputs.story_id }}
  story_id:
    description: The extracted story ID (underscore alias)
    value: ${{ steps.export-id.outputs.story_id }}
  pr:
    description: The PR num (if provided)
    value: ${{ steps.export-id.outputs.pr_num }}
  branch:
    description: The branch name
    value: ${{ steps.export-id.outputs.branch_name }}
  ephemeral-folder:
    description: The folder name to use for ephemeral deployments, based on story ID or PR num
    value: ${{ steps.export-id.outputs.story_id || (steps.export-id.outputs.pr_num && format('pr-{0}', steps.export-id.outputs.pr_num)) || 'unknown' }}

runs:
  using: composite
  steps:
    - name: Export Story details
      id: export-id
      shell: bash
      env:
        GITHUB_REF: ${{ github.ref }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
        pr_ref="${GITHUB_HEAD_REF:-}"
        pr_num="${GITHUB_EVENT_PR_NUMBER:-}"

        if [ -z "$pr_num" ]; then
          pr_num=$(echo "$GITHUB_REF" | sed -nE 's#^refs/pull/([0-9]+)/.*#\1#p')
        fi

        extract_story_id() {
          local candidate="${1:-}"
          local token=""

          candidate=$(printf '%s' "$candidate" | tr '[:upper:]' '[:lower:]')

          # Extract the first token like abc-123 from any branch/ref shape.
          token=$(printf '%s' "$candidate" | grep -Eo '[[:alnum:]][[:alnum:]-]*-[0-9]+' | head -n1 || true)
          if [ -n "$token" ]; then
            printf '%s' "$token"
          fi

          return 0
        }

        story_id=$(extract_story_id "$branch_name" || true)

        if [ -z "$story_id" ] && [ -n "$pr_ref" ]; then
          story_id=$(extract_story_id "$pr_ref" || true)
        fi

        echo "story_id=$story_id" >> "$GITHUB_OUTPUT"
        echo "story-id=$story_id" >> "$GITHUB_OUTPUT"
        echo "pr_num=$pr_num" >> "$GITHUB_OUTPUT"
        echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

        echo "Extracted story ID: $story_id"
        echo "PR number: $pr_num"
        echo "Branch name: $branch_name"
        echo "Ephemeral folder: ${story_id:-${pr_num:+pr-$pr_num}}"
